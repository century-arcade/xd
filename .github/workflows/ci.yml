name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff
      - run: ruff check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install pytest -r requirements.txt
      - run: pytest

  analyze:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Compute weekly cache key
        id: week
        run: echo "key=$(date -u +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Restore gxd cache
        uses: actions/cache@v4
        with:
          path: gxd
          key: gxd-${{ steps.week.outputs.key }}
          restore-keys: |
            gxd-

      - name: Clone or update gxd
        run: make setup-gxd

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run make analyze
        run: make analyze

      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: analyze-output
          path: |
            wwwroot/xd-clues.zip
            wwwroot/xd-metadata.zip
          if-no-files-found: warn
          retention-days: 7
